<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detection History — DeepShield AI</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/history.css" />
  <link rel="icon" href="assets/images/favicon.ico" />
</head>
<body class="dashboard-body">

  <!-- ── NAVBAR ─────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-dot"></span>
        DeepShield AI
      </a>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="detection/video-detection.html">Detect</a></li>
        <li><a href="history.html" class="active">History</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
      <div class="nav-right">
        <div class="nav-avatar" id="userAvatar" title="Profile">AS</div>
        <div class="avatar-dropdown" id="avatarDropdown">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="#" data-logout>Sign out</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ───────────────────────────────────────────── -->
  <main class="dash-main">

    <div class="dash-header">
      <div>
        <h1>Detection history</h1>
        <p class="dash-date" id="totalCount">Loading...</p>
      </div>
    </div>

    <!-- ── Toolbar — search + filters ───────────────────── -->
    <div class="history-toolbar">
      <div class="search-wrapper">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by filename..." />
      </div>

      <div class="filter-pills" id="filterPills">
        <button class="filter-pill active" data-filter="all">All types</button>
        <button class="filter-pill" data-filter="video">Video</button>
        <button class="filter-pill" data-filter="image">Image</button>
        <button class="filter-pill" data-filter="audio">Audio</button>
        <button class="filter-pill" data-filter="face_swap">Face swap</button>
      </div>
    </div>

    <!-- ── Table ──────────────────────────────────────── -->
    <div class="dash-card history-card">
      <div class="table-wrapper">
        <table class="detections-table">
          <thead>
            <tr>
              <th>File</th>
              <th>Type</th>
              <th>Status</th>
              <th>Confidence</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr><td colspan="6" class="table-empty">Loading detections...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- ── Pagination ───────────────────────────────── -->
      <div class="pagination">
        <span class="page-info" id="pageInfo">Showing 0 of 0</span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>

  </main>

  <!-- ── Result modal ───────────────────────────────────── -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-box">
      <button class="modal-close" id="closeModal" aria-label="Close">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalContent">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/history.js"></script>

</body>
</html>
